              <template v-if="cate_id && pid">

              <div id="editormd" ref="editormd" v-else>
                                <div class="muludiv">

                                        <li>

              <!-- 点赞 -->
              <div class="isSupport" v-if="isVue">
                <img
                  v-if="cateWiki.like"
                  @click="like(cate_id,0)"
                  src="/static/iconImage/isSupported.png"
                  alt=""
                  class="img"
                />
                <img
                  v-else
                  @click="like(cate_id,0)"
                  src="/static/iconImage/isSupport.png"
                  alt=""
                  class="img"
                />
                {{cateWiki.like_num}}人点赞
              </div>
              <div class="isSupport" v-else>
                <img
                  v-if="cateWiki.like"
                  @click="like(cate_id,0)"
                  src="/static/iconImage/isSupported.png"
                  alt=""
                  class="img"
                />
                <img
                  v-else
                  @click="like(cate_id,0)"
                  src="/static/iconImage/isSupport.png"
                  alt=""
                  class="img"
                />

              </div>
              <!-- 评论 -->
              <div class="comment-box">
                <template>
                  <div class="comment-title" v-if="isVue">
                    <span class="left">
                      评论({{cateWiki.comment_num}})
                      <span class="sort-text" :class="{'active' : !commentWhere.order}" @click="orderCommentList">
                        <!-- {{commentWhere.order ? '评论从旧到新':'评论从新到旧'}} -->
                        最新
                      </span>
                      <span class="sort-text" :class="{'active' : commentWhere.order}" @click="orderCommentList">
                        <!-- {{commentWhere.order ? '评论从旧到新':'评论从新到旧'}} -->
                        最早
                      </span>
                    </span>
                    <span class="right">
                      <img src="/static/iconImage/icon_eyes.png" alt="" class="eye" />
                      {{cateWiki.page_view_num}}人看过该文档
                    </span>
                  </div>
                  <div class="comment-title" v-else>
                    <span class="left">
                      评论(0)
                      <span class="sort-text" :class="{'active' : !commentWhere.order}" @click="orderCommentList">

                      </span>
                      <span class="sort-text" :class="{'active' : commentWhere.order}" @click="orderCommentList">
                        最早
                      </span>
                      <!-- <span class="sort-text" @click="orderCommentList">
                        {{commentWhere.order ? '评论从旧到新':'评论从新到旧'}}
                      </span> -->
                    </span>
                    <span class="right">
                      <img src="/static/iconImage/icon_eyes.png" alt="" class="eye" />
                      32494人看过
                    </span>
                  </div>
                </template>
                <!--未登录-->
                <div v-if="!userInfo.uid" class="comment-login flex flex-center">
                  <span class="login-btn" @click="loginFn()">登录/注册</span>
                  <span>即可发表评论</span>
                </div>
                <!--登录后才显示-->
                <template>
                  <div class="comment-input" v-if="userInfo.uid">
                    <img
                      v-if="userInfo.uid"
                      :src="userInfo.avatar"
                      alt=""
                      class="avatar"
                    />
                    <img
                      v-else
                      src="/static/index/images/no_portrait.png"
                      alt=""
                      class="avatar"
                    />
                    <div class="reply_count" style="width: 100%;">
                      <div class="new_reply">
                        <el-input
                          v-paste="handleParse"
                          v-model="commentContent"
                          show-word-limit
                          type="textarea"
                          autocomplete="off"
                          resize="none"
                          maxlength="1000"
                          placeholder="快来说两句吧..."
                          style="height: 105px;"
                        ></el-input>
                        <div class="flex reply_pic" v-if="replyPicList.length">
                          <div
                            class="reply_picture"
                            v-for="(item,index) in replyPicList"
                            :key="index"
                          >
                            <i class="del el-icon-close" @click="picdDel(index)"></i>
                            <img :src="item" class="w-60 h-60 reply-img" alt="" />
                          </div>
                        </div>
                      </div>
                      <div class="new_reply_btn">
                        <div>
                          <el-upload
                            accept=".jpeg,.png,.jpg,.bmp,.gif"
                            :action="imageUrl"
                            :on-success="handleSuccess"
                            :before-upload="beforeUpload"
                            :headers="myHeaders"
                            :show-file-list="false"
                          >
                            <span class="iconfont iconic_picture"></span>
                          </el-upload>
                        </div>
                        <el-button
                          :loading="isComment"
                          size="small"
                          style="width: 72px;"
                          type="primary"
                          @click="saveComment"
                          :disabled="!commentContent.length"
                        >
                          评论
                        </el-button>
                      </div> 
                    </div>
                  </div>

                  <div class="line"></div>
                  <div class="comment-list">
                    <!-- 一级评论 -->
                    <div
                      class="comment-item m-t-22"
                      v-for="(item ,index) in list"
                      :key="index"
                    >
                      <div class="left">
                        <img
                          :src="item.user ? item.user.avatar : '/static/index/images/no_portrait.png'"
                          alt=""
                          class="avatar"
                        />
                      </div>
                      <div class="right">
                        <div class="felx-between">
                          <span class="name">
                            {{item.user ? item.user.nickname : ''}}
                            <span
                              class="num"
                              v-if="item.user && item.user.uid == userInfo.uid"
                            >
                              （自评）
                            </span>
                          </span>
                        </div>
                        <div class="right-content">{{item.content}}</div>
                        <div
                          class="flex flex-wrap m-t-8 m-b-2"
                          v-if="item.images.length"
                        >
                          <el-image
                            class="w-100 h-100 d-block m-r-10 reply-image"
                            fit="cover"
                            v-for="(img,indexb) in item.images"
                            :key="indexb"
                            :src="img"
                            :preview-src-list="item.images"
                          ></el-image>
                        </div>
                        <div class="m-t-8 p-r-16">
                          <div class="reply-time">
                            <div class="time">
                              {{item.create_time}}
                              
                            </div>
                            <div class="flex">
                              <span class="reply ml20">
                                <span 
                                  v-if="!item.likeUser"
                                  @click="like(item.id,1,item)"
                                  class="icon iconfont iconic_Like">
                                </span>  
                                <span 
                                  v-else
                                  @click="like(item.id,1,item)"
                                  class="icon iconfont iconicon_Like_2">
                                </span>
                                {{item.like ? item.like.like_num : 0}}
                              </span>
                              <span
                                class="reply ml20"
                                :class="{'reply-blue' : replyIndex == index}"
                                @click="replyFn(index,item,1,item.id)"
                              >
                                <span class="icon iconfont iconic_pinglun"></span>
                                {{replyIndex == index ? '取消回复' : '回复'}}
                              </span>
                            </div>
                            <span
                                @click="delComment(item)"
                                v-if="item.user && item.user.uid == userInfo.uid"
                                class="delete-reply ml20"
                              >
                                删除
                              </span>
                          </div>

                          <!-- 一级回复 -->
                          <div class="mt14 mb24 reply_level" v-if="replyIndex == index">
                            <div class="new_reply">
                              <el-input
                                v-paste="handleParse"
                                v-model="commentChildContent"
                                show-word-limit
                                type="textarea"
                                autocomplete="off"
                                maxlength="1000"
                                resize="none"
                                autosize 
                                placeholder="快来说两句吧..."
                                style="min-height: 30px;"
                              ></el-input>
                              <div
                                class="flex reply_pic"
                                v-if="replyChildPicList.length"
                              >
                                <div
                                  class="reply_picture"
                                  v-for="(item,index) in replyChildPicList"
                                  :key="index"
                                >
                                  <i
                                    class="del el-icon-close"
                                    @click="picChildDel(index)"
                                  ></i>
                                  <img :src="item" class="reply-img" alt="" />
                                </div>
                              </div>
                            </div>
                            <div class="new_reply_btn">
                              <div>
                                <el-upload
                                  accept=".jpeg,.png,.jpg,.bmp,.gif"
                                  :action="imageUrl"
                                  :on-success="handleChildSuccess"
                                  :before-upload="beforeUpload"
                                  :headers="myHeaders"
                                  :show-file-list="false"
                                >
                                  <span class="iconfont iconic_picture"></span>
                                </el-upload>
                              </div>
                              <el-button
                                :loading="isChildComment"
                                size="small"
                                style="width: 72px;"
                                type="primary"
                                @click="saveChildComment"
                                :disabled="!commentChildContent"

          setupScrollListener() {
            let ticking = false; // 使用 requestAnimationFrame 进行性能优化
            
            const handleScroll = () => {
              if (!ticking) {
                window.requestAnimationFrame(() => {
                  this.calculateCurrentHeading();
                  ticking = false;
                });
                ticking = true;
              }
            };
            
            // 监听容器的滚动事件
            const contentContainer = window.document.getElementById('contentContainer');
            if (contentContainer) {
              contentContainer.addEventListener('scroll', handleScroll);
            }
            
            // 组件销毁时移除监听器（在 Vue 2 的 beforeDestroy 或 Vue 3 的 onUnmounted 中调用）
            // this.$once('hook:beforeDestroy', () => {
            //   contentContainer.removeEventListener('scroll', handleScroll);
            // });

          // 核心方法：计算当前应该高亮的标题索引
          calculateCurrentHeading() {
            try {
              const container = document.getElementsByClassName('markdown-body')[0];
              if (!container) return;
              
              // 检查是否有H2标题
              const h2Elements = container.querySelectorAll('h2');
              const hasH2 = h2Elements.length > 0;
              
              // 根据是否有H2决定使用哪个选择器
              const headingSelector = hasH2 ? 'h2' : 'h3';
              let headingElements = container.querySelectorAll(headingSelector);
              
              if (headingElements.length === 0) return;
              
              const contentContainer = document.getElementById('contentContainer');
              if (!contentContainer) return;
              
              const scrollTop = contentContainer.scrollTop;
              
              // 找出当前应该高亮的标题索引
              let activeIndex = 0;
              
              for (let i = 0; i < headingElements.length; i++) {
                  const heading = headingElements[i];
                  const headingTop = heading.offsetTop - contentContainer.offsetTop;
                  
                  // 如果当前标题的顶部位置小于滚动位置 + 100px，则认为是当前激活的
                  if (headingTop <= scrollTop + 100) {
                      activeIndex = i;
                  } else {
                      break;  // 后面的标题位置更大，不需要继续遍历
                  }
              }
              
              // 更新高亮索引（只有用户手动选择时才跳过）
              if (this.isManualSelection) {
                  return; // 用户手动选择中，不自动更新
              }
              if (this.treeActiveIndex !== activeIndex) {
                  console.log(`${hasH2 ? 'H2' : 'H3'}高亮切换: ${this.treeActiveIndex} -> ${activeIndex}`);
                  this.treeActiveIndex = activeIndex;
              }
              
            } catch (e) {
                console.log('计算当前标题时出错:', e);
            }
          },
          
          // 初始化方法（在 mounted 钩子中调用）
          initScrollTracking() {
            this.setupScrollListener();
            // 初始计算一次
            this.calculateCurrentHeading();
          },
            changeImage(action){
                let length = this.imagesList.length
                switch (action){
                    case 'prev':
                        if(this.imageIndex === 0){
                            this.imageUrl = this.imagesList[length - 1]
                            this.imageIndex = length
                        } else {
                            this.imageIndex--
                            this.imageUrl = this.imagesList[this.imageIndex]
                        }
                        break
                    case 'next':
                        if(this.imageIndex === length){
                            this.imageIndex = 0
                            this.imageUrl = this.imagesList[0]
                        }else{
                            this.imageIndex++
                            this.imageUrl = this.imagesList[this.imageIndex]
                        }
                        break
                    case 'out':
                        this.scale -= 0.1
                        this.styleTransform=this.getTransformStr(this.scale,this.rotation)
                        break
                    case 'in':
                        this.scale += 0.1
                        this.styleTransform=this.getTransformStr(this.scale,this.rotation)
                        break
                    case 'screen':
                        if (this.styleHW) {
                            this.styleHW=''
                        } else {
                            this.styleHW='max-height: 100%; max-width: 100%;'
                        }
                        break
                    case 'left':
                        this.rotation += 90;
                        if( (this.rotation / 90) === 4){
                            this.rotation = 0
                        }
                        this.styleTransform=this.getTransformStr(this.scale,this.rotation)
                        break
                    case 'right':
                        this.rotation -= 90;
                        if( (this.rotation / 90) === -4){
                            this.rotation = 0
                        }
                        this.styleTransform=this.getTransformStr(this.scale,this.rotation)
                        break
                }
            },
            getTransformStr(scale, rotation){
                return 'scale(' + scale + ') rotate('+rotation+'deg)';
            },

            // 替换原来的 findH3Tags 方法
            findAllHeadings() {
              setTimeout(() => {
                const container = document.getElementsByClassName('markdown-body')[0];
                if (!container) return;

                // 清空旧数据
                this.headingList = [];
                this.headingTree = [];
                this.h3TagsList = [];

                // 提取所有标题标签
                const headingTags = container.querySelectorAll('h2, h3, h4');

                // 使用计数器确保唯一性
                let counter = 0;

                headingTags.forEach((tag, index) => {
                  const level = parseInt(tag.tagName[1]);
                  const text = tag.textContent.trim();

                  // 使用时间戳+计数器+随机数确保唯一性
                  const timestamp = Date.now();
                  const random = Math.random().toString(36).substr(2, 5);
                  counter++;

                  // 设置唯一ID
                  tag.id = `heading-${timestamp}-${counter}-${random}`;

                  const heading = {
                    id: tag.id,
                    level: level,
                    text: text,
                    element: tag,
                    children: []
                  };

                  this.headingList.push(heading);

                  if (level === 3) {
                    this.h3TagsList.push(text);
                  }
                });

                // 构建标题树
                this.headingTree = this.buildHeadingTree(this.headingList);
                
                // 初始化展开状态（一级展开，二级和三级默认收起）
                this.expandedItems = {};
                this.headingTree.forEach(heading => {
                  if (heading.children && heading.children.length) {
                    this.$set(this.expandedItems, heading.id, true);
                    heading.children.forEach(child => {
                      if (child.children && child.children.length) {
                        this.$set(this.expandedItems, child.id, false);
                      }
                    });
                  }
                });
                
                // 图片点击处理
                const that = this;
                container.querySelectorAll('img').forEach(img => {
                  if (!this.imagesList.includes(img.src)) {
                    this.imagesList.push(img.src);
                  }
                  img.addEventListener('click', function() {
                    that.imageUrl = this.src;
                    that.dialogVisible = true;
                  });
                });

                // console.log('标题列表:', this.headingList);
                // console.log('标题树:', this.headingTree);

              }, 500);
            },

            // 新增：构建标题树
            buildHeadingTree(headings) {
              const tree = [];
              const stack = [];
              
              // 检查是否有H2、H3标题
              const hasH2 = headings.some(h => h.level === 2);
              const hasH3 = headings.some(h => h.level === 3);
              
              headings.forEach(heading => {
                  const node = { 
                      ...heading, 
                      children: [],
                      index: '', // 用于存储序号
                  };
                  
                  // 逻辑：
                  // 1. 如果有H2且有H3：处理H2、H3、H4
                  // 2. 如果有H2但没有H3：只处理H2（H4不显示）
                  // 3. 如果没有H2，有H3：处理H3、H4
                  // 4. 如果没有H2也没有H3，有H4：H4作为一级
                  
                  if (hasH2) {
                      // 有H2的情况
                      if (node.level === 2) {
                          // H2作为一级
                          node.index = (tree.length + 1).toString();
                          tree.push(node);
                          stack.length = 0;
                          stack.push({...node, level: 2});
                      } else if (hasH3 && node.level === 3) {
                          // 有H2有H3时，H3作为H2的子级
                          const parent = tree[tree.length - 1];
                          if (parent) {
                              node.index = `${parent.index}.${parent.children.length + 1}`;
                              parent.children.push(node);
                              stack.length = 0;
                              stack.push({...node, level: 3});
                          }
                      } else if (hasH3 && node.level === 4) {
                          // 有H2有H3时，H4作为H3的子级
                          const parent = stack[stack.length - 1];
                          if (parent && parent.level === 3) {
                              node.index = `${parent.index}.${parent.children.length + 1}`;
                              parent.children.push(node);
                          }
                      }
                      // 没有H3时，H3/H4都不处理
                  } else if (hasH3) {
                      // 没有H2，有H3的情况
                      if (node.level === 3) {
                          // H3作为一级
                          node.index = (tree.length + 1).toString();
                          tree.push(node);
                          stack.length = 0;
                          stack.push({...node, level: 3});
                      } else if (node.level === 4) {
                          // H4作为H3的子级
                          const parent = tree[tree.length - 1];
                          if (parent) {
                              node.index = `${parent.index}.${parent.children.length + 1}`;
                              parent.children.push(node);
                          }
                      }
                  } else {
                      // 没有H2也没有H3，有H4的情况
                      if (node.level === 4) {
                          // H4作为一级
                          node.index = (tree.length + 1).toString();
                          tree.push(node);
                      }
                  }
              });
              
              return tree;
            },

            // 新增：获取标题索引（用于高亮）
            getHeadingIndex(heading) {
             if (!heading || !heading.id) return -1;
  
              // 只查找 h3 标题

              for (let i = 0; i < h3Elements.length; i++) {
                if (h3Elements[i].id === heading.id || h3Elements[i] === heading.element) {
                  return i;
                }
              }
              
              return -1;
            },

            scrollToSubHeading(heading) {

              try {
                const container = document.getElementsByClassName('markdown-body')[0];

                const contentContainer = document.getElementById('contentContainer');
                if (!contentContainer) return;
                
                // 直接通过ID查找元素
                const targetHeading = document.getElementById(heading.id);
                
                if (targetHeading) {
                    // 计算目标位置，留110px边距
                    const headingTop = targetHeading.offsetTop - contentContainer.offsetTop;
                    const targetPosition = Math.max(0, headingTop + 110);
                    
                    console.log(`滚动到标题: ${heading.text}`);
                    this.currentActiveId = heading.id;
                    contentContainer.scrollTo({
                        top: targetPosition,
                        behavior: 'smooth'
                    });
                } else {
                    console.error('找不到标题元素:', heading.id);
